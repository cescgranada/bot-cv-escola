name: Bot de CVs Nou Patufet - Execució Setmanal

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  processar-cvs:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Checkout codi
        uses: actions/checkout@v4

      - name: 2. Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 3. Instal·lar llibreries
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-oauthlib google-auth-httplib2 pymupdf google-generativeai

      - name: 4. Executar Bot
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
