name: Bot de CVs Nou Patufet - Execució Setmanal

on:
  schedule:
    # S'executa cada dilluns a les 07:00 UTC (08:00 AM hora local)
    # Minut 0, Hora 7, Dia del mes *, Mes *, Dia de la setmana 1 (Dilluns)
    - cron: '0 7 * * 1'
  
  # Permet l'execució manual des de la pestanya 'Actions' de GitHub
  workflow_dispatch:

jobs:
  processar-cvs:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Descarregar el codi del repositori
        uses: actions/checkout@v3

      - name: 2. Configurar l'entorn de Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. Instal·lar les llibreries de Google API
        run: |
          pip install --upgrade pip
          pip install google-api-python-client google-auth-oauthlib google-auth-httplib2

      - name: 4. Executar el Bot de CVs
        env:
          # Aquest secret ha de contenir el JSON que vas treure del Colab
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python main.py
